name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run Sorbet
        run: bundle exec srb tc

      - name: Build gem
        run: bundle exec rake build

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem
          path: pkg/*.gem

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Delete previous main release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release delete main --yes || true
          git push --delete origin refs/tags/main || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: gem
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'main' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'main' || github.ref_name }}
          body: ${{ github.ref == 'refs/heads/main' && 'Latest build from main branch' || '' }}
          files: artifacts/*.gem
