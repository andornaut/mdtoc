name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.2'
        bundler-cache: true
    - name: Run tests
      run: bundle exec rake test
    - name: Run RuboCop
      run: bundle exec rubocop
    - name: Run Sorbet
      run: bundle exec srb tc
